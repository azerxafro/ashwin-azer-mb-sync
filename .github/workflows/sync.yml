name: Ashwin Azer MB Sync

on:
  schedule:
    # Runs every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "Data source to ingest (spotify | apple | all)"
        required: false
        default: "all"
      evidence:
        description: "Generate evidence pack alongside the report (true | false)"
        required: false
        default: "true"

jobs:
  sync:
    name: Ingest & Generate MusicBrainz Report
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Apple Music private key
        env:
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: printf '%s' "$APPLE_PRIVATE_KEY" > "${{ runner.temp }}/AuthKey.p8"

      - name: Run sync pipeline
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          SPOTIFY_ARTIST_ID: "6M1VSmwtcuwS1DnvXTGk7P"
          APPLE_MUSIC_ARTIST_ID: "1497428225"
          APPLE_MUSIC_STOREFRONT: "in"
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          EVIDENCE_FLAG=""
          if [ "${{ github.event.inputs.evidence || 'true' }}" = "true" ]; then
            EVIDENCE_FLAG="--evidence"
          fi

          python -m src.main "$SOURCE" $EVIDENCE_FLAG

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mb-sync-reports-${{ github.run_id }}
          path: |
            reports/
            evidence_packs/
          retention-days: 30

      - name: Open or update GitHub Issue with report summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find the latest Markdown report
            const reportsDir = 'reports';
            let reportBody = '_No report generated._';
            if (fs.existsSync(reportsDir)) {
              const files = fs.readdirSync(reportsDir)
                .filter(f => f.endsWith('.md'))
                .sort()
                .reverse();
              if (files.length > 0) {
                reportBody = fs.readFileSync(path.join(reportsDir, files[0]), 'utf8');
              }
            }

            const title = `[MB Sync] Report — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '> This issue was auto-generated by the **Ashwin Azer MB Sync** workflow.',
              '> Review the candidates below and submit edits manually on MusicBrainz.',
              '>',
              '> **MusicBrainz does not allow automated edits.**',
              '',
              reportBody,
            ].join('\n');

            // Look for an existing open issue with the same base title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'mb-sync',
            });

            const existing = issues.data.find(i => i.title.startsWith('[MB Sync] Report'));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['mb-sync'],
              });
              core.info(`Created issue #${created.data.number}`);
            }
