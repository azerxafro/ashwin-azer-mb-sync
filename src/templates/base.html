<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MB Sync{% endblock %} — Ashwin Azer MusicBrainz Sync</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .03em; }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .badge-missing { font-size: .75em; }
    .track-table th, .track-table td { font-size: .85em; }
    .mb-add-btn { white-space: nowrap; }
    #job-banner { display: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">🎵 MB Sync</a>
    <span class="navbar-text text-secondary small">Ashwin Azer · MusicBrainz Sync Tool</span>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmrzjbntDlHD1l4Hug3YFY7hOKHZ"
  crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
